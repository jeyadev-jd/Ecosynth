name: ecosynth
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - rdkit>=2023.9
  - pip
  - pip:
    - aizynthfinder
    - torch --index-url https://download.pytorch.org/whl/cpu
    - transformers>=4.40
    - chromadb>=0.5
    - sentence-transformers>=3.0
    - fastapi>=0.111
    - uvicorn[standard]
    - scikit-learn>=1.4
    - pandas>=2.0
    - pydantic-settings>=2.0
    - httpx>=0.27
    - joblib
    - requests
    - tqdm
    - pytest
    - aiofiles
    - python-multipart
